<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Obsession Trading Academy - Command Center PRO</title>

<style>
html, body { height: 100%; margin: 0; padding: 0; background-color: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
.container { display: flex; flex-direction: column; height: 100vh; padding: 10px; box-sizing: border-box; gap: 8px; }
.academy-header { text-align: center; font-size: 30px; font-weight: 900; background: linear-gradient(90deg, #ff0000, #ffae00, #00ff00, #00fbff, #bd00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; margin: 0; }
.main-row { display: flex; flex: 1; gap: 10px; min-height: 0; }
.chart-area { flex: 4; border: 1px solid #333; border-radius: 8px; overflow: hidden; background: #131722; }
.sidebar { flex: 1; display: flex; flex-direction: column; gap: 10px; min-width: 280px; }

.widget-box { border: 1px solid #333; background: #131722; border-radius: 8px; padding: 15px; }

.metric { margin-bottom: 10px; font-size: 15px; }
.metric span { font-weight: bold; }

.up { color: #00ff00; }
.down { color: #ff3b3b; }
.flash { box-shadow: 0 0 15px #ffae00; border-color: #ffae00; }

.alert-box { margin-top: 10px; font-size: 13px; color: #ffae00; }

.countdown { font-size: 12px; color: #aaa; margin-top: 4px; }
</style>
</head>

<body>

<div class="container">

<div class="academy-header">Obsession Trading Academy - PRO Desk</div>

<div class="main-row">

<div class="chart-area">
<div id="tradingview_advanced" style="height:100%;width:100%"></div>
<script src="https://s3.tradingview.com/tv.js"></script>
<script>
new TradingView.widget({
autosize: true,
symbol: "BINANCE:BTCUSDT",
interval: "15",
theme: "dark",
style: "1",
container_id: "tradingview_advanced"
});
</script>
</div>

<div class="sidebar">

<div class="widget-box" id="derivativesBox">

<h3>🚀 Binance Futures Live Desk</h3>

<div class="metric">Mark Price: <span id="markPrice">-</span></div>
<div class="metric">Open Interest: <span id="openInterest">-</span></div>
<div class="metric">Funding Rate: <span id="fundingRate">-</span></div>
<div class="countdown">Next Funding In: <span id="fundingCountdown">-</span></div>

<div class="alert-box" id="alertBox"></div>

</div>

</div>

</div>

</div>

<script>
// ===== AUDIO ALERT =====
const audio = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");

// ===== VARIABLES =====
let lastOI = null;
let lastFunding = null;
let nextFundingTime = null;

// ===== REST FETCH FOR OI + FUNDING =====
async function fetchData() {
try {
const oiRes = await fetch("https://fapi.binance.com/fapi/v1/openInterest?symbol=BTCUSDT");
const oiData = await oiRes.json();
const oi = parseFloat(oiData.openInterest);

const fundingRes = await fetch("https://fapi.binance.com/fapi/v1/premiumIndex?symbol=BTCUSDT");
const fundingData = await fundingRes.json();
const funding = parseFloat(fundingData.lastFundingRate);
nextFundingTime = fundingData.nextFundingTime;

document.getElementById("openInterest").innerText = oi.toLocaleString();
document.getElementById("fundingRate").innerText = (funding * 100).toFixed(4) + "%";

checkAlerts(oi, funding);

lastOI = oi;
lastFunding = funding;

} catch (err) {
console.log(err);
}
}

setInterval(fetchData, 10000);
fetchData();

// ===== WEBSOCKET FOR LIVE MARK PRICE =====
const ws = new WebSocket("wss://fstream.binance.com/ws/btcusdt@markPrice");

ws.onmessage = function(event) {
const data = JSON.parse(event.data);
const price = parseFloat(data.p);
document.getElementById("markPrice").innerText = price.toFixed(2);
};

// ===== FUNDING COUNTDOWN =====
setInterval(() => {
if (!nextFundingTime) return;
const now = Date.now();
const diff = nextFundingTime - now;
if (diff <= 0) return;

const hours = Math.floor(diff / 1000 / 60 / 60);
const minutes = Math.floor((diff / 1000 / 60) % 60);
const seconds = Math.floor((diff / 1000) % 60);

document.getElementById("fundingCountdown").innerText =
hours + "h " + minutes + "m " + seconds + "s";

}, 1000);

// ===== ALERT LOGIC =====
function checkAlerts(oi, funding) {

const alertBox = document.getElementById("alertBox");
const box = document.getElementById("derivativesBox");

alertBox.innerText = "";
box.classList.remove("flash");

if (lastOI) {
const delta = ((oi - lastOI) / lastOI) * 100;

if (Math.abs(delta) > 1) {
alertBox.innerText = "⚡ OI Spike Detected (" + delta.toFixed(2) + "%)";
box.classList.add("flash");
audio.play();
}
}

if (lastFunding !== null) {
if (funding > 0 && lastFunding < 0) {
alertBox.innerText = "🔥 Funding flipped POSITIVE (Long crowded)";
audio.play();
}
if (funding < 0 && lastFunding > 0) {
alertBox.innerText = "🔥 Funding flipped NEGATIVE (Short crowded)";
audio.play();
}
}

}
</script>

</body>
</html>

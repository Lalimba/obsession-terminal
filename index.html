<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Obsession Academy Dashboard</title>
    <style>
        body { background: #08080c; color: #fff; font-family: sans-serif; padding: 20px; }
        .dashboard-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; max-width: 1200px; margin: auto; }
        
        /* THE CHART BOX */
        .chart-container { 
            background: #131722; border: 1px solid #FFD700; border-radius: 12px; 
            height: 500px; position: relative; overflow: hidden;
        }
        
        /* EXPAND BUTTON */
        .expand-btn {
            position: absolute; top: 10px; right: 10px; z-index: 100;
            background: #FFD700; color: #000; border: none; padding: 8px 12px;
            border-radius: 4px; font-weight: bold; cursor: pointer;
        }

        .card { background: #1a1a2e; padding: 20px; border-radius: 12px; border: 1px solid #333; margin-bottom: 20px; }
        .btn-link { background: #FFD700; color: #000; border: none; padding: 12px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; text-decoration: none; display: block; text-align: center; }
        
        /* FULLSCREEN STYLE */
        :fullscreen .chart-container { width: 100vw; height: 100vh; border: none; border-radius: 0; }
        :-webkit-full-screen .chart-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>

<div class="dashboard-grid">
    <div id="mainChartArea" class="chart-container">
        <button class="expand-btn" onclick="toggleFull()">⛶ Full Screen</button>
        <div id="tv_chart" style="height: 100%;"></div>
        <script src="https://s3.tradingview.com/tv.js"></script>
        <script>
            new TradingView.widget({
                "autosize": true, "symbol": "OANDA:XAUUSD", "interval": "D",
                "theme": "dark", "style": "1", "container_id": "tv_chart"
            });

            function toggleFull() {
                let elem = document.getElementById("mainChartArea");
                if (!document.fullscreenElement) {
                    elem.requestFullscreen().catch(err => {
                        alert(`Error: ${err.message}`);
                    });
                } else {
                    document.exitFullscreen();
                }
            }
        </script>
    </div>

    <div class="sidebar">
        <div class="card">
            <h2 style="color: #FFD700;">⚖️ Goldrechner</h2>
            <p>Calculate live values on the official site.</p>
            <a href="https://www.goldpreis.de/goldrechner/" target="_blank" class="btn-link">Open Goldpreis.de</a>
        </div>

        <div class="card">
            <h2 style="color: #FFD700;">📜 Price History</h2>
            <p>Look up historical numerical data.</p>
            <a href="https://www.goldpreis.de/goldpreisentwicklung/" target="_blank" class="btn-link">Search All Years</a>
        </div>
    </div>
</div>

</body>
</html>

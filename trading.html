<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Trading Chart Tutorial for Beginners</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #0f0f0f;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      font-size: 30px;
      margin-bottom: 6px;
    }

    .subtitle {
      color: #cccccc;
      margin: 0 auto 20px;
      max-width: 900px;
      line-height: 1.5;
    }

    .topbar,
    .controls,
    .lesson-controls {
      max-width: 1050px;
      margin: 12px auto;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
    }

    button,
    select {
      padding: 10px 16px;
      font-size: 15px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
    }

    button {
      background: #2d2d2d;
      color: white;
      border: 1px solid #444;
      transition: 0.2s;
    }

    button:hover {
      background: #00aa66;
      transform: translateY(-1px);
    }

    select {
      background: #1f1f1f;
      color: white;
      border: 1px solid #444;
    }

    .active {
      background: #00aa66 !important;
      border-color: #00ff99;
    }

    .category-title {
      max-width: 1050px;
      margin: 18px auto 8px;
      color: #ffcc00;
      text-align: left;
      font-size: 18px;
      border-bottom: 1px solid #333;
      padding-bottom: 6px;
    }

    .panel {
      max-width: 900px;
      margin: 14px auto;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 16px;
      text-align: left;
      line-height: 1.6;
    }

    .panel h2 {
      margin: 0 0 8px;
      color: #ffcc00;
    }

    .meta {
      color: #bbbbbb;
      font-size: 14px;
      margin-bottom: 8px;
    }

    .quiz-box {
      margin-top: 14px;
      padding: 14px;
      background: #111;
      border: 1px solid #333;
      border-radius: 10px;
    }

    .quiz-answer {
      display: none;
      margin-top: 10px;
      color: #00ff99;
      font-weight: bold;
    }

    canvas {
      background: #222;
      margin-top: 14px;
      border: 1px solid #444;
      border-radius: 10px;
      cursor: crosshair;
      max-width: 100%;
    }

    .small-note {
      color: #aaa;
      font-size: 13px;
      margin-top: 10px;
    }

    @media (max-width: 600px) {
      body {
        padding: 12px;
      }

      h1 {
        font-size: 23px;
      }

      button,
      select {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <h1 id="mainTitle">Interactive Trading Chart Tutorial</h1>
  <p class="subtitle" id="subtitle">
    Learn price action, market structure, smart money concepts, and risk management step by step.
  </p>

  <div class="topbar">
    <select id="languageSelect" onchange="changeLanguage()">
      <option value="en">English</option>
      <option value="ti">ትግርኛ</option>
    </select>

    <select id="speedSelect" onchange="changeSpeed()">
      <option value="700">Slow</option>
      <option value="420" selected>Normal</option>
      <option value="180">Fast</option>
    </select>
  </div>

  <div id="lessonContainer"></div>

  <div class="lesson-controls">
    <button onclick="previousLesson()" id="prevBtn">Previous</button>
    <button onclick="togglePlayPause()" id="playPauseBtn">Pause</button>
    <button onclick="nextLesson()" id="nextBtn">Next</button>
    <button onclick="enableDrawMode()" id="drawBtn">Draw</button>
    <button onclick="disableDrawMode()" id="stopDrawBtn">Stop Drawing</button>
    <button onclick="resetChart()" id="resetBtn">Reset</button>
  </div>

  <div class="panel">
    <h2 id="lessonTitle">Tutorial</h2>
    <div class="meta" id="lessonMeta">Choose one tutorial button to start.</div>
    <div id="lessonText">Choose one tutorial button to start.</div>

    <div class="quiz-box" id="quizBox">
      <strong id="quizTitle">Quiz</strong>
      <p id="quizQuestion">Choose a lesson first.</p>
      <button onclick="showQuizAnswer()" id="showAnswerBtn">Show Answer</button>
      <div class="quiz-answer" id="quizAnswer"></div>
    </div>
  </div>

  <canvas id="chart" width="900" height="450"></canvas>
  <div class="small-note" id="note">Educational tool only. Not financial advice.</div>

function t(value) {
  if (typeof value === "string") return value;
  return value[currentLanguage] || value.en || "";
}

function lessonKeys() {
  return Object.keys(lessons);
}

function createLessonButtons() {
  lessonContainer.innerHTML = "";

  Object.keys(categories).forEach(categoryKey => {
    const title = document.createElement("div");
    title.className = "category-title";
    title.textContent = t(categories[categoryKey]);
    lessonContainer.appendChild(title);

    const controls = document.createElement("div");
    controls.className = "controls";

    lessonKeys()
      .filter(key => lessons[key].category === categoryKey)
      .forEach(key => {
        const btn = document.createElement("button");
        btn.textContent = t(lessons[key].button);
        btn.onclick = () => startLesson(key);
        btn.id = `btn-${key}`;
        if (key === currentLessonKey) btn.classList.add("active");
        controls.appendChild(btn);
      });

    lessonContainer.appendChild(controls);
  });
}

function updateUiLanguage() {
  const u = uiText[currentLanguage];
  document.documentElement.lang = currentLanguage === "ti" ? "ti" : "en";
  document.getElementById("mainTitle").textContent = u.mainTitle;
  document.getElementById("subtitle").textContent = u.subtitle;
  document.getElementById("prevBtn").textContent = u.previous;
  document.getElementById("nextBtn").textContent = u.next;
  document.getElementById("playPauseBtn").textContent = isPaused ? u.play : u.pause;
  document.getElementById("drawBtn").textContent = u.draw;
  document.getElementById("stopDrawBtn").textContent = u.stopDrawing;
  document.getElementById("resetBtn").textContent = u.reset;
  document.getElementById("quizTitle").textContent = u.quiz;
  document.getElementById("showAnswerBtn").textContent = u.showAnswer;
  document.getElementById("note").textContent = u.note;

  createLessonButtons();

  if (currentLessonKey) {
    updateLessonPanel(currentLessonKey);
    redrawChart();
  } else {
    lessonTitle.textContent = u.tutorial;
    lessonMeta.textContent = u.choose;
    lessonText.textContent = u.choose;
    quizQuestion.textContent = u.choose;
    quizAnswer.textContent = "";
  }
}

function changeLanguage() {
  currentLanguage = languageSelect.value;
  updateUiLanguage();
}

function clearCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function drawBackground() {
  ctx.strokeStyle = "#2f2f2f";
  ctx.lineWidth = 1;

  for (let x = 50; x < canvas.width; x += 50) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, canvas.height);
    ctx.stroke();
  }

  for (let y = 50; y < canvas.height; y += 50) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(canvas.width, y);
    ctx.stroke();
  }
}

function drawPointsAndLine() {
  if (!points.length) return;

  ctx.beginPath();
  ctx.moveTo(points[0].x, points[0].y);

  for (let i = 1; i <= index; i++) {
    ctx.lineTo(points[i].x, points[i].y);
  }

  ctx.strokeStyle = "#00ff88";
  ctx.lineWidth = 3;
  ctx.stroke();

  for (let i = 0; i <= index; i++) {
    ctx.beginPath();
    ctx.arc(points[i].x, points[i].y, 5, 0, Math.PI * 2);
    ctx.fillStyle = "white";
    ctx.fill();
  }
}

function drawZones() {
  const lesson = lessons[currentLessonKey];
  if (!lesson || !lesson.zones) return;

  ctx.font = "16px Arial";

  lesson.zones.forEach(zone => {
    ctx.strokeStyle = "#ffcc00";
    ctx.fillStyle = "white";
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 6]);

    if (zone.type === "line") {
      ctx.beginPath();
      ctx.moveTo(60, zone.y);
      ctx.lineTo(820, zone.y);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillText(t(zone.text), zone.textX, zone.textY);
    }

    if (zone.type === "box") {
      ctx.setLineDash([]);
      ctx.fillStyle = "rgba(255, 204, 0, 0.25)";
      ctx.fillRect(zone.x, zone.y, zone.w, zone.h);
      ctx.strokeStyle = "#ffcc00";
      ctx.strokeRect(zone.x, zone.y, zone.w, zone.h);
      ctx.fillStyle = "white";
      ctx.fillText(t(zone.text), zone.textX, zone.textY);
    }
  });

  ctx.setLineDash([]);
}

function drawLabels() {
  const lesson = lessons[currentLessonKey];
  if (!lesson || index < points.length - 1) return;

  ctx.fillStyle = "white";
  ctx.font = "16px Arial";

  if (lesson.labels) {
    lesson.labels.forEach(label => {
      ctx.fillText(t(label.text), label.x, label.y);
    });
  }
}

function redrawChart() {
  clearCanvas();
  drawBackground();
  drawZones();
  drawPointsAndLine();
  drawLabels();
}

function animate() {
  if (isPaused) return;

  if (index < points.length - 1) {
    index++;
    redrawChart();
  } else {
    clearInterval(interval);
    redrawChart();
  }
}

function startAnimation() {
  clearInterval(interval);
  isPaused = false;
  playPauseBtn.textContent = uiText[currentLanguage].pause;
  index = 0;
  redrawChart();
  interval = setInterval(animate, animationSpeed);
}

function updateLessonPanel(key) {
  const lesson = lessons[key];
  lessonTitle.textContent = t(lesson.title);
  lessonMeta.textContent = `${t(categories[lesson.category])} • ${t(lesson.level)}`;
  lessonText.textContent = t(lesson.text);
  quizQuestion.textContent = t(lesson.quiz.q);
  quizAnswer.textContent = t(lesson.quiz.a);
  quizAnswer.style.display = "none";
}

function startLesson(key) {
  currentLessonKey = key;
  points = lessons[key].points;
  updateLessonPanel(key);

  document.querySelectorAll("button").forEach(btn => btn.classList.remove("active"));
  const activeBtn = document.getElementById(`btn-${key}`);
  if (activeBtn) activeBtn.classList.add("active");

  startAnimation();
}

function previousLesson() {
  const keys = lessonKeys();
  if (!currentLessonKey) return startLesson(keys[0]);
  const currentIndex = keys.indexOf(currentLessonKey);
  const newIndex = currentIndex <= 0 ? keys.length - 1 : currentIndex - 1;
  startLesson(keys[newIndex]);
}

function nextLesson() {
  const keys = lessonKeys();
  if (!currentLessonKey) return startLesson(keys[0]);
  const currentIndex = keys.indexOf(currentLessonKey);
  const newIndex = currentIndex >= keys.length - 1 ? 0 : currentIndex + 1;
  startLesson(keys[newIndex]);
}

function togglePlayPause() {
  if (!currentLessonKey) return;
  isPaused = !isPaused;
  playPauseBtn.textContent = isPaused ? uiText[currentLanguage].play : uiText[currentLanguage].pause;
}

function changeSpeed() {
  animationSpeed = Number(speedSelect.value);
  if (currentLessonKey) startAnimation();
}

function showQuizAnswer() {
  quizAnswer.style.display = "block";
}

function enableDrawMode() {
  drawMode = true;
}

function disableDrawMode() {
  drawMode = false;
  isDrawing = false;
}

function resetChart() {
  clearInterval(interval);
  points = [];
  index = 0;
  currentLessonKey = "";
  drawMode = false;
  isDrawing = false;
  isPaused = false;
  document.querySelectorAll("button").forEach(btn => btn.classList.remove("active"));
  updateUiLanguage();
  clearCanvas();
  drawBackground();
}

function getMousePos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;

  return {
    x: (e.clientX - rect.left) * scaleX,
    y: (e.clientY - rect.top) * scaleY
  };
}

canvas.addEventListener("mousedown", (e) => {
  if (!drawMode) return;
  isDrawing = true;
  const pos = getMousePos(e);
  ctx.beginPath();
  ctx.moveTo(pos.x, pos.y);
});

canvas.addEventListener("mousemove", (e) => {
  if (!drawMode || !isDrawing) return;
  const pos = getMousePos(e);
  ctx.lineTo(pos.x, pos.y);
  ctx.strokeStyle = "#ffcc00";
  ctx.lineWidth = 2;
  ctx.stroke();
});

canvas.addEventListener("mouseup", () => isDrawing = false);
canvas.addEventListener("mouseleave", () => isDrawing = false);

canvas.addEventListener("touchstart", (e) => {
  if (!drawMode) return;
  e.preventDefault();
  isDrawing = true;
  const touch = e.touches[0];
  const pos = getMousePos(touch);
  ctx.beginPath();
  ctx.moveTo(pos.x, pos.y);
}, { passive: false });

canvas.addEventListener("touchmove", (e) => {
  if (!drawMode || !isDrawing) return;
  e.preventDefault();
  const touch = e.touches[0];
  const pos = getMousePos(touch);
  ctx.lineTo(pos.x, pos.y);
  ctx.strokeStyle = "#ffcc00";
  ctx.lineWidth = 2;
  ctx.stroke();
}, { passive: false });

canvas.addEventListener("touchend", () => isDrawing = false);

updateUiLanguage();
drawBackground();
</script>
